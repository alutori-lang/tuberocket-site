<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; background: linear-gradient(135deg, #0F0F0F 0%, #1a1a2e 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.card { text-align: center; }
.logo { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 32px; }
.logo-icon { width: 64px; height: 44px; background: #FF0000; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { width: 28px; height: 28px; fill: white; }
.logo-text { font-size: 42px; font-weight: 900; color: white; letter-spacing: -1px; }
h1 { font-size: 56px; font-weight: 900; color: white; line-height: 1.2; margin-bottom: 20px; max-width: 800px; }
h1 span { color: #FF0000; }
p { font-size: 22px; color: #aaa; max-width: 600px; margin: 0 auto 36px; }
.badges { display: flex; gap: 16px; justify-content: center; }
.badge { background: rgba(255,255,255,0.1); padding: 10px 24px; border-radius: 24px; color: white; font-size: 16px; font-weight: 600; }
.badge.red { background: #FF0000; }
</style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <span class="logo-text">TubeRocket</span>
    </div>
    <h1>Upload YouTube Videos <span>Like a Rocket</span></h1>
    <p>AI generates titles, descriptions, tags & thumbnails automatically</p>
    <div class="badges">
        <div class="badge red">Free on Play Store & App Store</div>
        <div class="badge">18 Languages</div>
        <div class="badge">Batch Upload</div>
    </div>
</div>
</body>
</html>
